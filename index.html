<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alora - Watch Demo</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0e3c2e;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        .c{max-width:420px;width:100%}
        .logo{font-size:28px;font-weight:700;letter-spacing:2px;margin-bottom:16px}
        .gold{color:#c5a065}
        h2{font-size:18px;margin-bottom:24px;font-weight:400;color:rgba(255,255,255,.85);line-height:1.4}
        .btn{display:block;text-decoration:none;font-weight:600;padding:16px 24px;border-radius:10px;font-size:17px;margin:12px auto;max-width:320px;text-align:center}
        .btn-gold{background:#c5a065;color:#0e3c2e}
        .btn-white{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.25)}
        .or{color:rgba(255,255,255,.4);font-size:13px;margin:8px 0}
        .hint{margin-top:24px;font-size:12px;color:rgba(255,255,255,.4);line-height:1.7}
        .url-box{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 14px;font-size:13px;color:#c5a065;word-break:break-all;margin:12px auto;max-width:320px;user-select:all;-webkit-user-select:all}
    </style>
</head>
<body>
<div class="c">
    <div class="logo">ALORA</div>
    <h2>Tap below to watch our<br><span class="gold">3-minute demo video</span></h2>

    <!-- Option 1: Direct youtu.be link with target=_blank -->
    <a class="btn btn-gold" href="https://youtu.be/vWmfv8pVvno" target="_blank" rel="noopener">
        &#9654;&ensp;Watch Video
    </a>

    <div class="or">- - -</div>

    <!-- Option 2: Full YouTube URL (different domain might behave differently) -->
    <a class="btn btn-white" href="https://www.youtube.com/watch?v=vWmfv8pVvno" target="_blank" rel="noopener">
        Open in Browser
    </a>

    <div class="or">- - -</div>

    <div class="hint">
        If the buttons above don't work, long-press a button<br>
        and choose <strong>"Open in browser"</strong>, or copy this link:
    </div>

    <!-- Selectable URL the user can long-press to copy -->
    <div class="url-box">https://youtu.be/vWmfv8pVvno</div>

    <div class="hint" style="margin-top:12px">
        Paste it in Chrome or your browser's address bar.
    </div>
</div>
</body>
</html>
