<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alora - Watch Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e3c2e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        .logo { font-size: 32px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
        .gold { color: #c5a065; }
        .status { font-size: 15px; margin: 16px 0; color: rgba(255,255,255,0.8); line-height: 1.5; }
        .btn {
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            margin: 8px;
            cursor: pointer;
            border: none;
        }
        .btn-gold { background: #c5a065; color: #0e3c2e; }
        .btn-outline { background: transparent; color: #c5a065; border: 2px solid #c5a065; }
        .btn:hover { opacity: 0.85; }
        .buttons { margin-top: 20px; }
        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            line-height: 1.6;
        }
        .copy-msg {
            display: none;
            margin-top: 10px;
            font-size: 13px;
            color: #c5a065;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ALORA</div>
        <div class="gold" style="font-size: 13px;">&#9654; Demo Video</div>

        <div class="status" id="status">
            Tap a button below to watch our demo video.
        </div>

        <div class="buttons">
            <a class="btn btn-gold" id="btn-app" href="#">
                Open in YouTube App
            </a>
            <br>
            <a class="btn btn-outline" id="btn-browser" href="#" target="_blank" rel="noopener">
                Open in Browser
            </a>
            <br>
            <button class="btn btn-outline" id="btn-copy" style="margin-top: 4px; font-size: 14px;">
                Copy Link
            </button>
        </div>

        <div class="copy-msg" id="copy-msg">Link copied! Paste it in Chrome or Safari.</div>

        <div class="hint">
            "Open in YouTube App" works if YouTube is installed.<br>
            "Open in Browser" opens Chrome/Safari outside this viewer.<br>
            "Copy Link" lets you paste the URL yourself.
        </div>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var videoId = params.get('v');

            if (!videoId) {
                document.getElementById('status').textContent = 'No video specified.';
                return;
            }

            var youtubeWeb = 'https://www.youtube.com/watch?v=' + videoId;
            var isAndroid = /android/i.test(navigator.userAgent);

            // === Button 1: Open in YouTube App ===
            var btnApp = document.getElementById('btn-app');

            if (isAndroid) {
                // Android Intent URL — the official way to open a specific app on Android
                // If YouTube app is installed, it opens directly. If not, falls back to web.
                btnApp.href = 'intent://www.youtube.com/watch?v=' + videoId
                    + '#Intent;scheme=https;package=com.google.android.youtube;end';
            } else {
                // iOS: try youtube:// scheme
                btnApp.href = 'youtube://www.youtube.com/watch?v=' + videoId;
            }

            // === Button 2: Open in Browser ===
            // Using window.open to try to escape the in-app WebView
            var btnBrowser = document.getElementById('btn-browser');
            btnBrowser.href = youtubeWeb;
            btnBrowser.addEventListener('click', function(e) {
                e.preventDefault();
                // window.open with _blank — on Android WebViews, this often
                // opens the system browser instead of staying in the WebView
                var w = window.open(youtubeWeb, '_blank');
                // If window.open was blocked or didn't work, fall back to location
                if (!w) {
                    window.location.href = youtubeWeb;
                }
            });

            // === Button 3: Copy Link ===
            var btnCopy = document.getElementById('btn-copy');
            btnCopy.addEventListener('click', function() {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(youtubeWeb).then(function() {
                        document.getElementById('copy-msg').style.display = 'block';
                    }).catch(function() {
                        fallbackCopy();
                    });
                } else {
                    fallbackCopy();
                }
            });

            function fallbackCopy() {
                var ta = document.createElement('textarea');
                ta.value = youtubeWeb;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    document.getElementById('copy-msg').style.display = 'block';
                } catch(e) {
                    prompt('Copy this link:', youtubeWeb);
                }
                document.body.removeChild(ta);
            }

            // Auto-attempt: try the app link immediately on page load
            // Use a hidden iframe so it doesn't replace the page if it fails
            try {
                var iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                if (isAndroid) {
                    iframe.src = 'intent://www.youtube.com/watch?v=' + videoId
                        + '#Intent;scheme=https;package=com.google.android.youtube;end';
                } else {
                    iframe.src = 'youtube://www.youtube.com/watch?v=' + videoId;
                }
                document.body.appendChild(iframe);
            } catch(e) {}
        })();
    </script>
</body>
</html>
