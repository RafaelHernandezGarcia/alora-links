<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alora - Opening Video...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e3c2e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        .logo { font-size: 32px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
        .gold { color: #c5a065; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(197,160,101,0.3);
            border-top-color: #c5a065;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 24px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { font-size: 16px; margin-bottom: 24px; color: rgba(255,255,255,0.8); }
        .fallback {
            display: inline-block;
            background: #c5a065;
            color: #0e3c2e;
            text-decoration: none;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            transition: opacity 0.2s;
        }
        .fallback:hover { opacity: 0.85; }
        .hint {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ALORA</div>
        <div class="gold" style="font-size:13px; margin-bottom: 4px;">&#9654;</div>
        <div class="spinner" id="spinner"></div>
        <div class="status" id="status">Opening YouTube app...</div>
        <a class="fallback" id="fallback" href="#" style="display:none;">Watch on YouTube</a>
        <div class="hint" id="hint" style="display:none;">
            If the video didn't open automatically,<br>tap the button above.
        </div>
    </div>

    <script>
        (function() {
            // Extract video ID from ?v= parameter
            var params = new URLSearchParams(window.location.search);
            var videoId = params.get('v');

            if (!videoId) {
                document.getElementById('status').textContent = 'No video specified.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            var youtubeWeb = 'https://www.youtube.com/watch?v=' + videoId;
            var youtubeApp = 'youtube://www.youtube.com/watch?v=' + videoId;

            // Set fallback link
            var fallbackBtn = document.getElementById('fallback');
            fallbackBtn.href = youtubeWeb;

            // Track if we've left the page (app opened successfully)
            var appOpened = false;

            // Listen for page becoming hidden (means app opened)
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) { appOpened = true; }
            });

            window.addEventListener('blur', function() {
                appOpened = true;
            });

            // Attempt 1: Try the youtube:// URI scheme to force app open
            // This breaks out of in-app browsers (Acrobat Reader, etc.)
            window.location.href = youtubeApp;

            // After 2.5 seconds, if app didn't open, show fallback
            setTimeout(function() {
                if (!appOpened) {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status').textContent = 'YouTube app not detected.';
                    fallbackBtn.style.display = 'inline-block';
                    document.getElementById('hint').style.display = 'block';

                    // Auto-redirect to web version after showing button briefly
                    setTimeout(function() {
                        if (!appOpened) {
                            window.location.href = youtubeWeb;
                        }
                    }, 3000);
                }
            }, 2500);
        })();
    </script>
</body>
</html>
